<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Request | ProductFlowAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <nav class="p-6"><a href="index.html" class="text-slate-500">← Back</a></nav>
    <main class="max-w-2xl mx-auto py-10 px-6">
        <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700">
            <h1 class="text-3xl font-bold mb-8">Request a Custom Tool</h1>
            <form action="https://formspree.io/f/mzdkkjno" method="POST" class="space-y-6">
                <input type="text" name="name" required placeholder="Your Name" class="w-full p-4 rounded-xl bg-slate-700 border-none">
                <input type="email" name="email" required placeholder="Your Email" class="w-full p-4 rounded-xl bg-slate-700 border-none">
                <textarea name="request" rows="5" required placeholder="What do you need built?" class="w-full p-4 rounded-xl bg-slate-700 border-none"></textarea>
                <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Send Request</button>
            </form>
        </div>
    </main>
</body>
</html>
